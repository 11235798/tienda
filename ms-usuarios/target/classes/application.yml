#El application.yml se encarga de manejar los puertos del microservicio y se conecta a la base de datos a través de Eureka y Swagger
server:
  port: 0
  error:
    include-stacktrace: never

spring:
  application:
    name: ms-usuarios
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5433/usuarios
    username: postgres
    password: 123
  jpa:
    hibernate:
      ddl-auto: update
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect

# [JJWT-INI]
# ── Configuración JWT ──────────────────────────────────────────
# Esta clave secreta DEBE ser idéntica en todos los microservicios
# para que los tokens generados por ms-usuarios sean válidos en
# ms-catalogo y ms-recursos.
# Para dar el valor al "secret" trasformaremos la frase clave (inventada) 
# "tokenSecretKeyBiblioteca2026TriskeleduSecurity" a formato Base64
jwt:
  secret: "dG9rZW5TZWNyZXRLZXlCaWJsaW90ZWNhMjAyNlRyaXNrZWxlZHVTZWN1cml0eQ=="
  expiration-ms: 3600000   # 1 hora en milisegundos
# [JJWT-FIN]

# [SWAGGER-INI] 
# Configuración de SpringDoc/Swagger UI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
# [SWAGGER-FIN] 

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true
    instance-id: "${spring.application.name}:${random.value}"
    lease-renewal-interval-in-seconds: 15
    lease-expiration-duration-in-seconds: 60
